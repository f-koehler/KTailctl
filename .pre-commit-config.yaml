---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v22.1.5"
    hooks:
      - id: clang-format
  - repo: https://github.com/neocmakelsp/neocmakelsp
    rev: v0.10.3
    hooks:
      - id: neocmakelsp-format
  - repo: local
    hooks:
      - id: qmlformat
        name: qmlformat
        description: Format QML files
        entry: scripts/qmlformat.sh -i
        types: [qml]
        language: system
      - id: qmllint
        name: qmllint
        description: Lint QML files
        entry: scripts/qmllint.sh -I build/bin
        types: [qml]
        language: system
      - id: sync-go-versions
        name: sync Go versions
        language: system
        entry: scripts/sync_go_versions.py
        pass_filenames: false
        files: ^(src/tailscale/wrapper/go\.mod|tools/go\.mod)$
      - id: golangci-lint
        name: golangci-lint
        language: golang
        language_version: 1.26.4
        entry: bash -c
        args: ["cd src/tailscale/wrapper && golangci-lint run --fix"]
        pass_filenames: false
        files: ^src/tailscale/wrapper/
        additional_dependencies:
          - "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2"
      - id: golangci-lint-fmt
        name: golangci-lint fmt
        language: golang
        language_version: 1.26.4
        entry: bash -c
        args: ["cd src/tailscale/wrapper && golangci-lint fmt"]
        pass_filenames: false
        files: ^src/tailscale/wrapper/
        additional_dependencies:
          - "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2"
      - id: govulncheck
        name: govulncheck
        language: golang
        language_version: 1.26.4
        entry: bash -c
        args: ["cd src/tailscale/wrapper && govulncheck ./..."]
        pass_filenames: false
        files: ^src/tailscale/wrapper/
        additional_dependencies:
          - "golang.org/x/vuln/cmd/govulncheck@v1.3.0"
      - id: shfmt
        name: shfmt
        language: golang
        language_version: 1.26.4
        entry: shfmt
        args: [-w]
        types: [shell]
        additional_dependencies:
          - "mvdan.cc/sh/v3/cmd/shfmt@v3.13.1"
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        exclude: '\.clang-format$'
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: '\.clang-format$'
  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: "1.39.9"
    hooks:
      - id: basedpyright
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-config-verify
        args:
          - --config=src/tailscale/wrapper/.golangci.yml
