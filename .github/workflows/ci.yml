---
name: CI
"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
jobs:
  git_hooks:
    name: Git hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/tailscale/wrapper/go.mod
          cache-dependency-path: src/tailscale/wrapper/go.sum
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Add Kitware CMake repository
        run: |
          KEYRING=/usr/share/keyrings/kitware-archive-keyring.gpg
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "https://apt.kitware.com/ubuntu/ noble main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
      - name: Add KDE Neon repository
        run: |
          KEYRING=/usr/share/keyrings/neon.gpg
          wget -qO - 'https://archive.neon.kde.org/public.key' \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "http://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/neon.list >/dev/null
      - name: Update apt cache
        run: sudo apt-get update -yq
      - name: Install dependencies
        run: sudo ./scripts/neon-deps.sh
      - name: Vendor Go dependencies
        run: go mod vendor
        working-directory: src/tailscale/wrapper
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DKTAILCTL_ENABLE_TESTS=OFF \
            -DKTAILCTL_FLATPAK_BUILD=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Run git hooks
        uses: j178/prek-action@v2
  flatpak_build:
    name: Flatpak Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/tailscale/wrapper/go.mod
          cache-dependency-path: src/tailscale/wrapper/go.sum
      - name: Vendor Go dependencies.
        run: go mod vendor
        working-directory: src/tailscale/wrapper
      - name: Update apt cache.
        run: sudo apt-get update -yq
      - name: Install flatpak-builder
        run: sudo apt-get install -yq flatpak-builder flatpak appstream
      - name: Show flatpak-builder version
        run: flatpak-builder --version
      - name: Install flatpak dependencies
        run: ./scripts/flatpak-deps.sh
      - name: Validate manifest
        run: |
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
          manifest org.fkoehler.KTailctl.yml
      - name: Validate manifest
        run: |
          flatpak run org.flathub.flatpak-external-data-checker \
          --check-outdated org.fkoehler.KTailctl.yml
      - name: Build
        run: |
          flatpak-builder --user --force-clean \
          build-dir org.fkoehler.KTailctl.yml
  lint:
    name: Lint (${{ matrix.linter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - linter: clang-tidy
            script: ./scripts/clang-tidy.sh
          - linter: clazy
            script: ./scripts/clazy.sh
          - linter: cppcheck
            script: ./scripts/cppcheck.sh
          - linter: iwyu
            script: ./scripts/iwyu.sh
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/tailscale/wrapper/go.mod
          cache-dependency-path: src/tailscale/wrapper/go.sum
      - name: Vendor Go dependencies
        run: go mod vendor
        working-directory: src/tailscale/wrapper
      - name: Add Kitware CMake repository
        run: |
          KEYRING=/usr/share/keyrings/kitware-archive-keyring.gpg
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "https://apt.kitware.com/ubuntu/ noble main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
      - name: Add KDE Neon repository
        run: |
          KEYRING=/usr/share/keyrings/neon.gpg
          wget -qO - 'https://archive.neon.kde.org/public.key' \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "http://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/neon.list >/dev/null
      - name: Update apt cache
        run: sudo apt-get update -yq
      - name: Install dependencies
        run: sudo ./scripts/neon-deps.sh
      - name: Add LLVM apt repository
        if: matrix.linter == 'clang-tidy'
        run: |
          KEYRING=/usr/share/keyrings/llvm-archive-keyring.gpg
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update -yq
          sudo apt-get install -yq clang-tidy-22
      - name: Install lint dependencies
        run: sudo apt-get install -yq clang-tools clazy iwyu
      - name: Build cppcheck from source
        if: matrix.linter == 'cppcheck'
        run: |
          sudo apt-get install -yq libpcre3-dev
          git clone --depth 1 --branch 2.20.0 \
            https://github.com/danmar/cppcheck.git /tmp/cppcheck
          cmake -B /tmp/cppcheck/build -S /tmp/cppcheck \
            -G Ninja -DCMAKE_BUILD_TYPE=Release -DHAVE_RULES=ON
          cmake --build /tmp/cppcheck/build --parallel
          sudo cmake --install /tmp/cppcheck/build
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DKTAILCTL_ENABLE_TESTS=OFF \
            -DKTAILCTL_FLATPAK_BUILD=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Run ${{ matrix.linter }}
        run: ${{ matrix.script }}
  native_build:
    name: Native Build (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
          - compiler: clang-sanitizers
            cc: clang
            cxx: clang++
            cmake_flags: >-
              -DKTAILCTL_ENABLE_ASAN=ON -DKTAILCTL_ENABLE_UBSAN=ON
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/tailscale/wrapper/go.mod
          cache-dependency-path: src/tailscale/wrapper/go.sum
      - name: Vendor Go dependencies
        run: go mod vendor
        working-directory: src/tailscale/wrapper
      - name: Add Kitware CMake repository
        run: |
          KEYRING=/usr/share/keyrings/kitware-archive-keyring.gpg
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "https://apt.kitware.com/ubuntu/ noble main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
      - name: Add KDE Neon repository
        run: |
          KEYRING=/usr/share/keyrings/neon.gpg
          wget -qO - 'https://archive.neon.kde.org/public.key' \
            | gpg --dearmor - \
            | sudo tee "${KEYRING}" >/dev/null
          echo "deb [signed-by=${KEYRING}]" \
            "http://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/neon.list >/dev/null
      - name: Update apt cache
        run: sudo apt-get update -yq
      - name: Install dependencies
        run: sudo ./scripts/neon-deps.sh
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DKTAILCTL_ENABLE_TESTS=ON \
            -DKTAILCTL_FLATPAK_BUILD=OFF \
            ${{ matrix.cmake_flags }}
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
  create_release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - git_hooks
      - flatpak_build
      - lint
      - native_build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup go.
        uses: actions/setup-go@v6
        with:
          go-version-file: src/tailscale/wrapper/go.mod
          cache-dependency-path: src/tailscale/wrapper/go.sum
      - name: Create release
        run: ./scripts/create-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
